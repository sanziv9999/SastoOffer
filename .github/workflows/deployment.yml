name: Publish Website to cPanel
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name:  Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name:  Build Assets (Vite/Mix)
        run: |
          npm install
          npm run build

      - name:  Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer

      - name:  Install PHP Dependencies
        run: composer install --no-dev --optimize-autoloader

      # STEP 1: Deploy Laravel Core
      - name:  Deploy Laravel Core
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.SERVER }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./
          server-dir: /home/sastooffer/
          exclude: |
            public/**
            .git*
            node_modules/**
            tests/**
            README.md
            .github/**

      # STEP 2: Deploy Public Folder Contents
      - name:  Deploy Public Assets
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.SERVER }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./public/
          server-dir: /home/sastooffer/public_html/
