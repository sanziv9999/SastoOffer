name: Publish Website to CPanel
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2.1.0
        with:
          fetch-depth: 2

      - name: Build assets
        run: npm install && npm run build

      - name: Install PHP and Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: 'composer'

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader

      # Step 1: Deploy Laravel root files (excluding public)
      - name: Deploy Laravel root files
        uses: SamKirkland/FTP-Deploy-Action@4.3.3
        with:
          server: ${{ secrets.SERVER }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          protocol: sftp             # Use SFTP for reliability
          port: 22
          local-dir: ./              # Laravel project root
          server-dir: /home/sastooffer
          exclude: |
            public/**

      # Step 2: Deploy public folder contents to public_html
      - name: Deploy public folder
        uses: SamKirkland/FTP-Deploy-Action@4.3.3
        with:
          server: ${{ secrets.SERVER }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          protocol: sftp
          port: 22
          local-dir: ./public
          server-dir: /home/sastooffer/public_html
