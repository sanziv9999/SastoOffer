name: Publish Website to CPanel
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2.1.0
        with:
          fetch-depth: 2

      - name: Build assets
        run: npm install && npm run build

      - name: Install PHP and Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: 'composer'

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader

      # Step 1: Deploy everything except public folder to root
      - name: Deploy Laravel root files
        uses: SamKirkland/FTP-Deploy-Action@4.3.3
        with:
          server: ${{ secrets.SERVER }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          local-dir: ./        # Laravel root
          server-dir: /        # FTP root
          exclude: |
            public/**         # exclude public folder

      # Step 2: Deploy public folder contents to public_html
      - name: Deploy public folder
        uses: SamKirkland/FTP-Deploy-Action@4.3.3
        with:
          server: ${{ secrets.SERVER }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          local-dir: ./public  # only public folder
          server-dir: /public_html
