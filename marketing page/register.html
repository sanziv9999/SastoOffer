<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create Account - Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <style>
    .bg-muted {
      background-color: rgba(100, 116, 139, 0.04);
    }

    .bg-card {
      background-color: white;
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center px-4 py-12 bg-muted">
  <div class="w-full max-w-md">
    <a href="#" class="inline-flex items-center gap-2 text-sm text-gray-600 hover:text-blue-600 mb-6">
      <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M19 12H5" />
        <path d="M12 19L5 12 12 5" />
      </svg>
      Back to Home
    </a>
    <div class="bg-white rounded-lg shadow-md overflow-hidden">
      <div class="p-6">
        <h1 class="text-2xl font-bold text-center">Create an account</h1>
        <p class="mt-2 text-sm text-gray-600 text-center">Enter your details to create your account</p>
      </div>

      <div class="p-6 border-t">
        <div class="grid grid-cols-3 gap-3 mb-6">
          <button type="button" class="border rounded py-2 flex items-center justify-center" onclick="social('Google')">
            <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24">
              <path
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                fill="#4285F4" />
              <path
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                fill="#34A853" />
              <path
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                fill="#FBBC05" />
              <path
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                fill="#EA4335" />
            </svg>
            Google
          </button>
          <button type="button" class="border rounded py-2 flex items-center justify-center text-blue-600"
            onclick="social('Facebook')">
            <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M22 12a10 10 0 1 0-11.5 9.9v-7h-2.2V12h2.2V9.5c0-2.2 1.3-3.4 3.2-3.4.9 0 1.8.1 1.8.1v2h-1c-1 0-1.3.6-1.3 1.2V12h2.3l-.4 2.9h-1.9v7A10 10 0 0 0 22 12z" />
            </svg>
            Facebook
          </button>
          <button type="button" class="border rounded py-2 flex items-center justify-center" onclick="social('Apple')">
            <svg fill="#000000" class="w-5 h-5 mr-1.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
              <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
              <g id="SVGRepo_iconCarrier">
                <path
                  d="M18.71 19.5C17.88 20.74 17 21.95 15.66 21.97C14.32 22 13.89 21.18 12.37 21.18C10.84 21.18 10.37 21.95 9.09997 22C7.78997 22.05 6.79997 20.68 5.95997 19.47C4.24997 17 2.93997 12.45 4.69997 9.39C5.56997 7.87 7.12997 6.91 8.81997 6.88C10.1 6.86 11.32 7.75 12.11 7.75C12.89 7.75 14.37 6.68 15.92 6.84C16.57 6.87 18.39 7.1 19.56 8.82C19.47 8.88 17.39 10.1 17.41 12.63C17.44 15.65 20.06 16.66 20.09 16.67C20.06 16.74 19.67 18.11 18.71 19.5ZM13 3.5C13.73 2.67 14.94 2.04 15.94 2C16.07 3.17 15.6 4.35 14.9 5.19C14.21 6.04 13.07 6.7 11.95 6.61C11.8 5.46 12.36 4.26 13 3.5Z">
                </path>
              </g>
            </svg>
            Apple
          </button>
        </div>

        <div class="relative mb-6">
          <div class="border-t"></div>
          <div class="absolute inset-0 flex items-center justify-center">
            <span class="bg-white px-2 text-sm text-gray-500">OR</span>
          </div>
        </div>

        <form id="registerForm">
          <div class="space-y-4">
            <div class="space-y-2">
              <label for="name" class="text-sm font-medium">Name</label>
              <input id="name" name="name" type="text" placeholder="John Doe" class="w-full border rounded px-3 py-2"
                required />
            </div>
            <div class="space-y-2">
              <label for="email" class="text-sm font-medium">Email</label>
              <input id="email" name="email" type="email" placeholder="name@example.com"
                class="w-full border rounded px-3 py-2" required />
            </div>
            <div class="space-y-2">
              <label for="password" class="text-sm font-medium">Password</label>
              <input id="password" name="password" type="password" placeholder="••••••••"
                class="w-full border rounded px-3 py-2" required />
            </div>
            <div class="space-y-2">
              <label for="confirmPassword" class="text-sm font-medium">Confirm Password</label>
              <input id="confirmPassword" name="confirmPassword" type="password" placeholder="••••••••"
                class="w-full border rounded px-3 py-2" required />
            </div>
            <div class="flex items-center space-x-2">
              <input id="terms" class="cursor-pointer" type="checkbox" class="h-4 w-4" />
              <label for="terms" class="text-sm cursor-pointer">I accept the <a href="#" class="text-blue-600">terms and
                  conditions</a></label>
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white rounded px-4 py-2">Create
              account</button>
          </div>
        </form>
      </div>

      <div class="p-4 border-t text-center">
        <p class="text-sm text-gray-600">Already have an account? <a href="#" class="text-blue-600 font-semibold">Sign
            in</a></p>
      </div>
    </div>
  </div>

  <script>

    document.getElementById('registerForm').addEventListener('submit', function (e) {
      e.preventDefault();
      var name = document.getElementById('name').value.trim();
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value.trim();
      var confirm = document.getElementById('confirmPassword').value.trim();
      var terms = document.getElementById('terms').checked;

      if (!name || !email || !password || !confirm) {
        alert('Please fill in all fields');
        return;
      }
      if (password !== confirm) {
        alert('Passwords do not match');
        return;
      }
      if (!terms) {
        alert('Please accept the terms and conditions');
        return;
      }

      var btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      setTimeout(function () {
        alert('Account created (demo). Redirecting to /dashboard');
        window.location.href = '#';
      }, 900);
    });
  </script>
</body>

</html>
